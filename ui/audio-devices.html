<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Devices</title>
<link rel="stylesheet" href="shared.css">
<style>
  :root {
    --panel: rgba(255, 255, 255, 0.055);
    --panel-strong: rgba(255, 255, 255, 0.09);
    --line: rgba(255, 255, 255, 0.11);
    --glow: rgba(78, 201, 176, 0.28);
  }

  body {
    background:
      radial-gradient(circle at 18% 8%, rgba(0, 122, 204, 0.24), transparent 34%),
      radial-gradient(circle at 82% 18%, rgba(78, 201, 176, 0.18), transparent 30%),
      linear-gradient(145deg, #15151d 0%, #1b1b28 48%, #121219 100%);
  }

  .titlebar {
    background: rgba(20, 20, 28, 0.72);
    backdrop-filter: blur(18px);
  }

  .shell {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    padding: 18px;
    gap: 14px;
  }

  .hero {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 18px;
  }

  .headline {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .eyebrow {
    color: var(--success);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 24px;
    line-height: 1.1;
    font-weight: 700;
  }

  .hint {
    color: var(--text-secondary);
    font-size: 12px;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .pill, .segmented button, .icon-btn {
    -webkit-app-region: no-drag;
    border: 1px solid var(--line);
    color: var(--text-primary);
    background: var(--panel);
    border-radius: 999px;
    height: 32px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 0 12px;
    color: var(--text-secondary);
    font-size: 12px;
  }

  .segmented {
    display: inline-flex;
    gap: 4px;
    padding: 3px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.16);
  }

  .segmented button {
    height: 26px;
    border: 0;
    padding: 0 12px;
    cursor: pointer;
    color: var(--text-secondary);
  }

  .segmented button.active {
    color: #081110;
    background: linear-gradient(135deg, #5eead4, #7dd3fc);
    box-shadow: 0 0 24px var(--glow);
  }

  .icon-btn {
    width: 34px;
    cursor: pointer;
    font-size: 16px;
  }

  .content {
    min-height: 0;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .column {
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.045);
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
    overflow: hidden;
  }

  .column-head {
    padding: 14px 14px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.04);
  }

  .column-title {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 14px;
    font-weight: 700;
  }

  .count {
    color: var(--text-secondary);
    font-size: 11px;
  }

  .list {
    overflow: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .device {
    display: grid;
    grid-template-columns: 38px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(12, 12, 18, 0.42);
    transition: transform 0.14s, border 0.14s, background 0.14s;
  }

  .device:hover {
    transform: translateY(-1px);
    background: var(--panel-strong);
    border-color: rgba(125, 211, 252, 0.35);
  }

  .device.active {
    border-color: rgba(94, 234, 212, 0.72);
    box-shadow: inset 0 0 0 1px rgba(94, 234, 212, 0.28), 0 0 30px rgba(94, 234, 212, 0.10);
  }

  .badge {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    display: grid;
    place-items: center;
    background: linear-gradient(145deg, rgba(125, 211, 252, 0.18), rgba(94, 234, 212, 0.12));
    border: 1px solid var(--line);
    color: var(--success);
    font-size: 16px;
  }

  .meta {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .name {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
    font-weight: 650;
  }

  .description {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #9fb2c8;
    font-size: 12px;
  }

  .state {
    color: var(--text-secondary);
    font-size: 11px;
  }

  .state.on {
    color: var(--success);
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .star, .activate {
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: pointer;
    height: 30px;
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.06);
  }

  .star {
    width: 32px;
    color: var(--text-muted);
    font-size: 15px;
  }

  .star.favorite {
    color: #ffd166;
    border-color: rgba(255, 209, 102, 0.36);
    background: rgba(255, 209, 102, 0.12);
  }

  .activate {
    padding: 0 10px;
    font-size: 12px;
  }

  .activate.primary {
    color: #081110;
    border-color: transparent;
    background: linear-gradient(135deg, #5eead4, #7dd3fc);
  }

  .empty {
    margin: auto;
    max-width: 240px;
    text-align: center;
    color: var(--text-secondary);
    line-height: 1.45;
    padding: 28px 12px;
  }

  .warning {
    display: none;
    padding: 10px 12px;
    border: 1px solid rgba(206, 145, 120, 0.36);
    border-radius: 12px;
    background: rgba(206, 145, 120, 0.10);
    color: var(--warning);
    font-size: 12px;
  }

  .warning.visible { display: block; }

  @media (max-width: 720px) {
    .hero { align-items: stretch; flex-direction: column; }
    .toolbar { justify-content: flex-start; }
    .content { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="titlebar">
    <div class="grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="titlebar-title"><span class="titlebar-icon">Audio</span> Dispositivos de audio</div>
    <div class="window-controls">
      <button class="win-btn" onclick="send('minimize')">-</button>
      <button class="win-btn win-close" onclick="send('close')">x</button>
    </div>
  </div>

  <main class="shell">
    <section class="hero">
      <div class="headline">
        <div class="eyebrow">Entrada y salida</div>
        <h1>Switch rápido de audio</h1>
        <div class="hint" id="hint">Marcá favoritos y activá el dispositivo que necesitás.</div>
      </div>
      <div class="toolbar">
        <span class="pill" id="hotkeyPill">Hotkey sin asignar</span>
        <div class="segmented" aria-label="Filtro">
          <button id="showAll" class="active" onclick="setFilter('all')">Todos</button>
          <button id="showFavs" onclick="setFilter('favorites')">Favoritos</button>
        </div>
        <button class="icon-btn" title="Refrescar" onclick="send('refresh')">↻</button>
      </div>
    </section>

    <div id="warning" class="warning">NirCmd no está configurado; puedo listar dispositivos, pero no activar defaults.</div>

    <section class="content">
      <div class="column">
        <div class="column-head">
          <div class="column-title"><span>Salida</span></div>
          <div class="count" id="playbackCount">0 dispositivos</div>
        </div>
        <div id="playbackList" class="list"></div>
      </div>
      <div class="column">
        <div class="column-head">
          <div class="column-title"><span>Entrada</span></div>
          <div class="count" id="captureCount">0 dispositivos</div>
        </div>
        <div id="captureList" class="list"></div>
      </div>
    </section>
  </main>

<script>
  let state = { devices: { playback: [], capture: [] }, hasNirCmd: false, hotkey: '' };
  let filter = 'favorites';

  function send(action, payload = {}) {
    window.chrome.webview.postMessage({ action, ...payload });
  }

  function setFilter(next) {
    filter = next;
    render();
  }

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
  }

  function visibleDevices(kind) {
    const devices = state.devices?.[kind] || [];
    return filter === 'favorites' ? devices.filter(device => device.favorite) : devices;
  }

  function renderList(kind, elementId, countId) {
    const root = document.getElementById(elementId);
    const devices = visibleDevices(kind);
    document.getElementById(countId).textContent = `${devices.length} dispositivo${devices.length === 1 ? '' : 's'}`;

    if (!devices.length) {
      root.innerHTML = `<div class="empty">${filter === 'favorites' ? 'No hay favoritos en esta sección todavía.' : 'No encontré dispositivos para esta sección.'}</div>`;
      return;
    }

    root.innerHTML = devices.map((device, index) => {
      const icon = kind === 'capture' ? 'Mic' : 'Out';
      const active = device.active ? 'active' : '';
      const favorite = device.favorite ? 'favorite' : '';
      const name = escapeHtml(device.name);
      const description = escapeHtml(device.description || device.bus || 'Dispositivo de audio');
      const bus = device.bus && device.bus !== device.description ? ` · ${escapeHtml(device.bus)}` : '';
      return `
        <article class="device ${active}">
          <div class="badge">${icon}</div>
          <div class="meta" title="${name} - ${description}">
            <div class="name">${name}</div>
            <div class="description">${description}${bus}</div>
            <div class="state ${device.active ? 'on' : ''}">${device.active ? 'Default device' : 'Ready'}</div>
          </div>
          <div class="actions">
            <button class="star ${favorite}" title="Favorito" data-action="toggleFavorite" data-kind="${kind}" data-index="${index}">★</button>
            <button class="activate ${device.active ? '' : 'primary'}" data-action="activate" data-kind="${kind}" data-index="${index}">${device.active ? 'Activo' : 'Activar'}</button>
          </div>
        </article>`;
    }).join('');
  }

  function render() {
    document.getElementById('showAll').classList.toggle('active', filter === 'all');
    document.getElementById('showFavs').classList.toggle('active', filter === 'favorites');
    document.getElementById('warning').classList.toggle('visible', !state.hasNirCmd);
    document.getElementById('hotkeyPill').textContent = state.hotkey ? `Hotkey: ${state.hotkey}` : 'Hotkey sin asignar';
    renderList('playback', 'playbackList', 'playbackCount');
    renderList('capture', 'captureList', 'captureCount');
  }

  window.chrome.webview.addEventListener('message', event => {
    const data = event.data || {};
    if (data.action === 'state') {
      state = data;
      render();
    }
  });

  document.addEventListener('keydown', event => {
    if (event.key === 'Escape') send('close');
    if (event.key.toLowerCase() === 'f') setFilter(filter === 'favorites' ? 'all' : 'favorites');
    if (event.key.toLowerCase() === 'r') send('refresh');
  });

  document.addEventListener('click', event => {
    const button = event.target.closest('[data-action]');
    if (!button) return;
    const kind = button.dataset.kind;
    const index = Number(button.dataset.index);
    const device = visibleDevices(kind)[index];
    if (!device) return;
    if (button.dataset.action === 'activate') {
      for (const item of state.devices[kind] || []) item.active = false;
      device.active = true;
      render();
    }
    send(button.dataset.action, { kind, name: device.name });
  });

  render();
  send('ready');
</script>
</body>
</html>
