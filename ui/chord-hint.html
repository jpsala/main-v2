<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chord Hint</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #11111d;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 0;
    font-family: "Segoe UI Variable Text", "Segoe UI", sans-serif;
    border-radius: 12px;
  }

  .hint {
    width: 100%;
    background: #11111d;
    color: #e0e0ec;
    border-radius: 12px;
    padding: 10px 10px 8px;
    display: flex;
    flex-direction: column;
  }

  .header {
    font-size: 10.5px;
    line-height: 1;
    color: #9580d0;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding: 0 4px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  #rows {
    column-count: 1;
    column-gap: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 28px;
    break-inside: avoid;
    padding: 2px 8px;
    border-radius: 7px;
    transition: background 0.1s;
  }

  .row + .row {
    margin-top: 1px;
  }

  .row:hover {
    background: rgba(120, 100, 200, 0.18);
    cursor: pointer;
  }
  .row:active {
    background: rgba(120, 100, 200, 0.30);
  }

  .key {
    min-width: 26px;
    height: 20px;
    padding: 0 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    border: 1px solid rgba(140, 120, 210, 0.30);
    background: rgba(100, 80, 170, 0.15);
    color: #c4b6f0;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 11.5px;
    font-weight: 500;
    line-height: 1;
    flex-shrink: 0;
  }

  .label {
    color: #c8c8d8;
    font-size: 12.5px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
  }

  .row:hover .label {
    color: #e4e4f0;
  }

  .row.submenu .label {
    color: #cec4ed;
  }

  .submenu-clue {
    color: rgba(160, 140, 220, 0.7);
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    margin-left: auto;
  }

  .freeze-status {
    display: none;
    align-items: center;
    gap: 7px;
    margin: 8px 4px 0;
    padding-top: 7px;
    border-top: 1px solid rgba(140, 120, 210, 0.18);
    color: rgba(200, 200, 216, 0.78);
    font-size: 10.5px;
    line-height: 1;
    white-space: nowrap;
  }

  .freeze-status.visible {
    display: flex;
  }

  .freeze-status.active {
    color: #d8ccff;
  }

  .freeze-dot {
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: rgba(150, 130, 220, 0.55);
    box-shadow: 0 0 0 3px rgba(150, 130, 220, 0.08);
    flex-shrink: 0;
  }

  .freeze-status.active .freeze-dot {
    background: #8ef0c1;
    box-shadow: 0 0 10px rgba(142, 240, 193, 0.45);
  }

  .freeze-key {
    min-width: 26px;
    height: 18px;
    padding: 0 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    border: 1px solid rgba(140, 120, 210, 0.28);
    background: rgba(100, 80, 170, 0.13);
    color: #c4b6f0;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 10.5px;
  }
</style>
</head>
<body>
  <div class="hint">
    <div class="header" id="prefix">ALT+T →</div>
    <div id="rows"></div>
    <div class="freeze-status" id="freeze-status">
      <span class="freeze-dot"></span>
      <span id="freeze-text"></span>
    </div>
  </div>

<script>
  function esc(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function renderChordHint(payload) {
    if (!payload) return;

    const prefix = document.getElementById("prefix");
    const rows = document.getElementById("rows");
    const freezeStatus = document.getElementById("freeze-status");
    const freezeText = document.getElementById("freeze-text");
    prefix.innerHTML = `${esc(payload.prefix)} &rarr;`;
    rows.style.columnCount = Math.max(1, Number(payload.columns) || 1);
    rows.style.height = `${Math.max(0, Number(payload.rowsHeight) || 0)}px`;

    const holdOpenKey = payload.holdOpenKey ? String(payload.holdOpenKey) : "";
    const holdOpenActive = Boolean(payload.holdOpenActive);
    freezeStatus.classList.toggle("visible", Boolean(holdOpenKey));
    freezeStatus.classList.toggle("active", holdOpenActive);
    freezeText.innerHTML = holdOpenKey
      ? holdOpenActive
        ? `Frozen: press next key`
        : `Press <span class="freeze-key">${esc(holdOpenKey)}</span> to freeze`
      : "";

    rows.innerHTML = (payload.entries || [])
      .map(({ key, rawKey, label, submenu }) =>
        `<div class="row${submenu ? " submenu" : ""}" data-key="${esc(rawKey)}">`
          + `<div class="key">${esc(key)}</div>`
          + `<div class="label">${esc(label)}</div>`
          + `${submenu ? `<div class="submenu-clue">&rsaquo;</div>` : ""}`
        + `</div>`
      )
      .join("");

    rows.querySelectorAll(".row[data-key]").forEach(row => {
      row.addEventListener("click", () => {
        const k = row.getAttribute("data-key");
        if (k && window.chrome && window.chrome.webview)
          window.chrome.webview.postMessage(k);
      });
    });
  }

  window.renderChordHint = renderChordHint;
</script>
</body>
</html>
