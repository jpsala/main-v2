<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Palette</title>
<link rel="stylesheet" href="shared.css">
<style>
  :root { color-scheme: dark; }
  body { border: 1px solid #3f3f46; border-radius: 10px; background: #1e1e1e; }
  .palette { display: flex; flex: 1; min-height: 0; flex-direction: column; }
  .search-shell { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); background: #252526; }
  .back-button { display: none; width: 28px; height: 28px; border: 0; border-radius: 4px; background: transparent; color: var(--text-primary); font-size: 18px; cursor: pointer; }
  .back-button.visible { display: inline-flex; align-items: center; justify-content: center; }
  .back-button:hover, .back-button:focus-visible { background: var(--bg-hover); outline: 1px solid var(--accent); }
  .search-icon { color: #c8c8c8; font-size: 18px; line-height: 1; }
  #query { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text-primary); font: 16px var(--font-ui); }
  #query::placeholder { color: #a8a8a8; }
  .result-count { color: var(--text-secondary); font: 12px var(--font-ui); white-space: nowrap; }
  .page-bar { display: none; padding: 6px 14px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-size: 11px; background: var(--bg-primary); }
  .page-bar.visible { display: block; }
  #results { flex: 1; overflow-y: auto; padding: 6px; }
  .result { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 4px 16px; align-items: center; min-height: 52px; padding: 8px 10px; border-radius: 5px; cursor: pointer; }
  .result:hover, .result.active { background: var(--bg-active); }
  .result-main { min-width: 0; color: var(--text-primary); font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-meta { min-width: 0; color: var(--text-secondary); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-end { grid-row: 1 / span 2; grid-column: 2; white-space: nowrap; }
  .result-shortcut { color: #d5e9ff; background: rgba(0, 122, 204, 0.22); border: 1px solid rgba(133, 194, 236, 0.32); border-radius: 4px; padding: 3px 6px; font: 11px var(--font-mono); }
  .group-chevron { color: var(--text-secondary); font-size: 22px; padding: 0 6px; }
  .empty { display: none; flex: 1; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 13px; }
  .empty.visible { display: flex; }
  .footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 8px 14px; border-top: 1px solid var(--border); color: var(--text-secondary); font-size: 11px; background: #252526; }
  .footer kbd { padding: 1px 4px; color: var(--text-primary); border: 1px solid #555; border-radius: 3px; font-family: var(--font-mono); }
  @media (prefers-reduced-motion: no-preference) { .result { transition: background-color 120ms ease-out; } }
</style>
</head>
<body>
  <main class="palette">
    <div class="search-shell">
      <button id="back-button" class="back-button" type="button" aria-label="Back">‹</button>
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input id="query" type="text" placeholder="Search commands" autocomplete="off" spellcheck="false" aria-label="Search commands">
      <span id="result-count" class="result-count"></span>
    </div>
    <div id="page-bar" class="page-bar"></div>
    <section id="results" aria-label="Commands"></section>
    <div id="empty" class="empty">No commands found</div>
    <footer class="footer"><span><kbd>↑↓</kbd> Navigate &nbsp; <kbd>Enter</kbd> Open &nbsp; <kbd>Esc</kbd> Close</span><span id="source-count"></span></footer>
  </main>
<script src="ahk-bridge.js"></script>
<script>
let catalog = [];
let filtered = [];
let activeIndex = 0;
let levelsPerPage = 0;
let groupsFirst = false;
let currentGroupId = null;

function fold(value) {
  return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLocaleLowerCase();
}

function scoreField(query, value, weight) {
  const text = fold(value);
  if (!text) return 0;
  if (text === query) return weight * 10000;
  if (text.startsWith(query)) return weight * 8000 - text.length;
  const wordIndex = text.search(new RegExp(`(^|[\\s›:._/-])${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`));
  if (wordIndex >= 0) return weight * 6000 - wordIndex;
  let cursor = 0;
  let previous = -2;
  let score = 0;
  for (const character of query) {
    const index = text.indexOf(character, cursor);
    if (index < 0) return 0;
    score += weight * 10;
    if (index === previous + 1) score += weight * 8;
    if (index === 0 || /[\s›:._/-]/.test(text[index - 1])) score += weight * 12;
    previous = index;
    cursor = index + 1;
  }
  return score;
}

function scoreCommand(query, command) {
  if (!query) return 1;
  return Math.max(
    scoreField(query, command.label, 5),
    scoreField(query, command.breadcrumb, 3),
    scoreField(query, command.source, 2),
    scoreField(query, command.shortcut, 2),
    scoreField(query, command.detail, 1)
  );
}

function commandById(id) {
  return catalog.find(command => command.id === id);
}

function isInsideCurrentPage(command) {
  if (!currentGroupId) return true;
  let parentId = command.parentId;
  while (parentId) {
    if (parentId === currentGroupId) return true;
    parentId = commandById(parentId)?.parentId;
  }
  return false;
}

function kindPriority(command) {
  if (command.kind === 'group') return groupsFirst ? 0 : 1;
  return groupsFirst ? 1 : 0;
}

function orderByKind(commands) {
  return commands
    .map((command, order) => ({ command, order }))
    .sort((a, b) => kindPriority(a.command) - kindPriority(b.command) || a.order - b.order)
    .map(item => item.command);
}

function visiblePageItems() {
  const descendants = catalog.filter(isInsideCurrentPage);
  if (levelsPerPage === 0) return descendants.filter(command => command.kind === 'action');

  const baseDepth = currentGroupId ? commandById(currentGroupId).depth : 0;
  const boundaryDepth = baseDepth + levelsPerPage;
  return orderByKind(descendants.filter(command =>
    (command.kind === 'action' && command.depth <= boundaryDepth) ||
    (command.kind === 'group' && command.depth === boundaryDepth)
  ));
}

function pageItems(query) {
  const normalized = fold(query.trim());
  const visible = visiblePageItems();
  if (!normalized) return visible;
  return visible
    .map((command, order) => ({ command, order, score: scoreCommand(normalized, command) }))
    .filter(item => item.score > 0)
    .sort((a, b) => kindPriority(a.command) - kindPriority(b.command) || b.score - a.score || a.order - b.order)
    .map(item => item.command);
}

function filterCommands(query) {
  filtered = pageItems(query);
  activeIndex = 0;
  render();
}

function descendantActionCount(groupId) {
  const previousGroupId = currentGroupId;
  currentGroupId = groupId;
  const count = catalog.filter(command => command.kind === 'action' && isInsideCurrentPage(command)).length;
  currentGroupId = previousGroupId;
  return count;
}

function resultMeta(command) {
  const path = [command.source, command.breadcrumb].filter(Boolean).join(' › ');
  if (command.kind === 'group') return `${path}${path ? ' · ' : ''}${descendantActionCount(command.id)} commands`;
  if (!command.detail) return path;
  return path ? `${path} · ${command.detail}` : command.detail;
}

function renderPageContext() {
  const group = currentGroupId ? commandById(currentGroupId) : null;
  const backButton = document.querySelector('#back-button');
  const pageBar = document.querySelector('#page-bar');
  backButton.classList.toggle('visible', Boolean(group));
  pageBar.classList.toggle('visible', Boolean(group));
  pageBar.textContent = group ? [group.source, group.breadcrumb, group.label].filter(Boolean).join(' › ') : '';
}

function render() {
  const list = document.querySelector('#results');
  const empty = document.querySelector('#empty');
  const count = document.querySelector('#result-count');
  list.replaceChildren();
  count.textContent = filtered.length ? `${filtered.length} results` : '';
  empty.classList.toggle('visible', filtered.length === 0);
  list.style.display = filtered.length ? 'block' : 'none';
  renderPageContext();

  filtered.forEach((command, index) => {
    const row = document.createElement('div');
    row.className = `result${index === activeIndex ? ' active' : ''}`;
    row.addEventListener('click', () => activate(command));
    const main = document.createElement('div');
    main.className = 'result-main';
    main.textContent = command.label;
    const meta = document.createElement('div');
    meta.className = 'result-meta';
    meta.textContent = resultMeta(command);
    const end = document.createElement('span');
    end.className = `result-end ${command.kind === 'group' ? 'group-chevron' : 'result-shortcut'}`;
    end.textContent = command.kind === 'group' ? '›' : command.shortcut;
    row.append(main, meta, end);
    list.append(row);
  });
  list.querySelector('.active')?.scrollIntoView({ block: 'nearest' });
}

function execute(command) {
  if (command?.kind === 'action') postToAHK({ action: 'execute', id: command.id });
}

function enterGroup(command) {
  if (command?.kind !== 'group') return;
  currentGroupId = command.id;
  const input = document.querySelector('#query');
  input.value = '';
  filterCommands('');
  input.focus();
}

function goBack() {
  if (!currentGroupId) return false;
  currentGroupId = commandById(currentGroupId)?.parentId || null;
  const input = document.querySelector('#query');
  input.value = '';
  filterCommands('');
  input.focus();
  return true;
}

function activate(command) {
  if (command?.kind === 'group') enterGroup(command);
  else execute(command);
}

function moveActive(delta) {
  if (!filtered.length) return;
  activeIndex = (activeIndex + delta + filtered.length) % filtered.length;
  render();
}

function focusPalette() {
  currentGroupId = null;
  const input = document.querySelector('#query');
  input.value = '';
  filterCommands('');
  input.focus();
}

const input = document.querySelector('#query');
input.addEventListener('input', event => filterCommands(event.target.value));
input.addEventListener('keydown', event => {
  if (event.key === 'ArrowDown') { event.preventDefault(); moveActive(1); }
  else if (event.key === 'ArrowUp') { event.preventDefault(); moveActive(-1); }
  else if (event.key === 'ArrowLeft' && event.altKey) { event.preventDefault(); goBack(); }
  else if (event.key === 'Backspace' && !input.value && currentGroupId) { event.preventDefault(); goBack(); }
  else if (event.key === 'Enter') { event.preventDefault(); activate(filtered[activeIndex]); }
  else if (event.key === 'Escape') { event.preventDefault(); postToAHK({ action: 'cancel' }); }
});
document.querySelector('#back-button').addEventListener('click', goBack);

function setPaletteState(state) {
  catalog = Array.isArray(state?.catalog) ? state.catalog : [];
  levelsPerPage = Math.max(0, Number(state?.levelsPerPage) || 0);
  groupsFirst = Boolean(state?.groupsFirst);
  document.querySelector('#source-count').textContent = `${catalog.filter(command => command.kind === 'action').length} commands`;
  focusPalette();
}

window.chrome.webview.addEventListener('message', event => {
  let state = event.data;
  if (typeof state === 'string') {
    try { state = JSON.parse(state); } catch { state = {}; }
  }
  setPaletteState(state);
});
window.setPaletteState = setPaletteState;
window.focusPalette = focusPalette;
</script>
</body>
</html>
