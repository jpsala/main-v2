<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Picker</title>
<style>
  :root {
    --bg-primary: #1E1E1E;
    --bg-input: #252526;
    --bg-hover: #2A2A2A;
    --bg-active: #094771;
    --text-primary: #F0F0F0;
    --text-secondary: #AAAAAA;
    --text-muted: #666666;
    --accent: #007ACC;
    --border: #333333;
    --font-mono: 'Consolas', 'Courier New', monospace;
    --font-ui: 'Segoe UI', sans-serif;
    --radius: 4px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    border: 1px solid rgba(255, 255, 255, 0.25);
  }

  /* Drag bar */
  .drag-bar {
    -webkit-app-region: drag;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px 6px;
    border-bottom: 1px solid var(--border);
  }

  .grip {
    display: grid;
    grid-template-columns: repeat(3, 4px);
    grid-template-rows: repeat(2, 4px);
    gap: 2px;
    opacity: 0.3;
    flex-shrink: 0;
  }

  .grip span {
    width: 4px;
    height: 4px;
    border-radius: 1px;
    background: #888;
  }

  .drag-bar h2 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  /* Search input */
  .search-row {
    flex-shrink: 0;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-input);
  }

  .search-icon {
    color: var(--text-muted);
    font-size: 14px;
    flex-shrink: 0;
  }

  #filter-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-ui);
    font-size: 13px;
    caret-color: var(--accent);
    user-select: text;
  }

  #filter-input::placeholder {
    color: var(--text-muted);
  }

  /* Items list */
  .items-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  .items-container::-webkit-scrollbar {
    width: 10px;
  }

  .items-container::-webkit-scrollbar-track {
    background: var(--bg-primary);
  }

  .items-container::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 5px;
  }

  .items-container::-webkit-scrollbar-thumb:hover {
    background: #777;
  }

  .item {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    transition: background-color 0.1s;
  }

  .item:hover {
    background: var(--bg-hover);
  }

  .item.active {
    background: var(--bg-active);
  }

  .item-key {
    flex-shrink: 0;
    min-width: 30px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(0, 122, 204, 0.15);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .item-label {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
  }

  .item-submenu-indicator {
    flex-shrink: 0;
    color: var(--text-muted);
    font-size: 12px;
  }

  .no-results {
    padding: 20px;
    text-align: center;
    color: var(--text-muted);
  }

  /* Breadcrumb for submenus */
  .breadcrumb {
    flex-shrink: 0;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    background: rgba(0, 0, 0, 0.2);
  }

  .breadcrumb-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb-separator {
    color: var(--text-muted);
  }

  .breadcrumb-back {
    cursor: pointer;
    color: var(--accent);
    text-decoration: underline;
  }

  .breadcrumb-back:hover {
    color: #1e90ff;
  }

  /* Status bar */
  .status-bar {
    flex-shrink: 0;
    padding: 4px 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-hint {
    display: flex;
    gap: 12px;
  }

  .hint-key {
    font-family: var(--font-mono);
    background: rgba(255, 255, 255, 0.08);
    padding: 1px 4px;
    border-radius: 2px;
  }
</style>
</head>
<body>
  <div class="drag-bar">
    <div class="grip">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
    <h2 id="menu-title">Menu</h2>
  </div>

  <div class="breadcrumb" id="breadcrumb" style="display: none;">
    <span class="breadcrumb-back" onclick="goBack()">← Back</span>
    <span class="breadcrumb-separator">›</span>
    <span class="breadcrumb-item" id="breadcrumb-path"></span>
  </div>

  <div class="search-row">
    <span class="search-icon">🔍</span>
    <input 
      type="text" 
      id="filter-input" 
      placeholder="Type to filter..." 
      autocomplete="off"
      spellcheck="false"
    >
  </div>

  <div class="no-results" id="no-results" style="display: none;">
    No matches found
  </div>
  <div class="items-container" id="items-container">
  </div>

  <div class="status-bar">
    <div class="status-hint">
      <span><span class="hint-key">↑↓</span> Navigate</span>
      <span><span class="hint-key">Enter</span> Select</span>
      <span><span class="hint-key">Esc</span> Close</span>
    </div>
    <span id="item-count">0 items</span>
  </div>

<script>
let allItems = [];
let filteredItems = [];
let selectedIndex = 0;
let menuStack = []; // Stack to track submenu navigation
let currentParentKeys = [];

function init(menuData) {
  if (!menuData) return;

  if (menuData.title) {
    document.getElementById('menu-title').textContent = menuData.title;
  }

  allItems = menuData.items || [];
  currentParentKeys = menuData.parentKeys || [];

  updateBreadcrumb();
  filterItems('');
  focusInput();
}

function updateBreadcrumb() {
  const breadcrumb = document.getElementById('breadcrumb');
  const breadcrumbPath = document.getElementById('breadcrumb-path');
  
  if (currentParentKeys.length > 0) {
    breadcrumb.style.display = 'flex';
    breadcrumbPath.textContent = currentParentKeys.join(' › ');
  } else {
    breadcrumb.style.display = 'none';
  }
}

function goBack() {
  if (menuStack.length > 0) {
    const previousMenu = menuStack.pop();
    allItems = previousMenu.items;
    currentParentKeys = previousMenu.parentKeys;
    
    updateBreadcrumb();
    
    const filterInput = document.getElementById('filter-input');
    filterInput.value = '';
    filterItems('');
    focusInput();
  }
}

function filterItems(query) {
  query = query.toLowerCase();
  
  if (query === '') {
    filteredItems = allItems;
  } else {
    filteredItems = allItems.filter(item => {
      const keyMatch = item.key.toLowerCase().includes(query);
      const labelMatch = item.label.toLowerCase().includes(query);
      return keyMatch || labelMatch;
    });
  }
  
  selectedIndex = 0;
  renderItems();
}

function renderItems() {
  const container = document.getElementById('items-container');
  const noResults = document.getElementById('no-results');
  const itemCount = document.getElementById('item-count');

  container.innerHTML = '';

  if (filteredItems.length === 0) {
    noResults.style.display = 'block';
    itemCount.textContent = '0 items';
    return;
  }

  noResults.style.display = 'none';
  itemCount.textContent = `${filteredItems.length} item${filteredItems.length === 1 ? '' : 's'}`;

  filteredItems.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'item' + (index === selectedIndex ? ' active' : '');
    div.onclick = () => selectItem(index);
    
    const keySpan = document.createElement('span');
    keySpan.className = 'item-key';
    keySpan.textContent = item.key;
    
    const labelSpan = document.createElement('span');
    labelSpan.className = 'item-label';
    labelSpan.textContent = item.label;
    
    div.appendChild(keySpan);
    div.appendChild(labelSpan);
    
    if (item.items && item.items.length > 0) {
      const indicator = document.createElement('span');
      indicator.className = 'item-submenu-indicator';
      indicator.textContent = '►';
      div.appendChild(indicator);
    }
    
    container.appendChild(div);
  });
  
  // Scroll to selected item
  scrollToSelected();
}

function scrollToSelected() {
  const container = document.getElementById('items-container');
  const items = container.querySelectorAll('.item');
  
  if (items[selectedIndex]) {
    items[selectedIndex].scrollIntoView({
      block: 'nearest',
      behavior: 'smooth'
    });
  }
}

function selectItem(index) {
  if (index < 0 || index >= filteredItems.length) return;
  
  const item = filteredItems[index];
  
  if (item.items && item.items.length > 0) {
    // Navigate to submenu
    menuStack.push({
      items: allItems,
      parentKeys: currentParentKeys
    });
    
    currentParentKeys = [...currentParentKeys, item.key];
    allItems = item.items;
    
    updateBreadcrumb();
    
    const filterInput = document.getElementById('filter-input');
    filterInput.value = '';
    filterItems('');
    focusInput();
  } else {
    // Execute item - build full key path
    const fullKey = [...currentParentKeys, item.key].join('');
    sendToAHK('select', fullKey);
  }
}

function moveSelection(delta) {
  selectedIndex += delta;
  
  if (selectedIndex < 0) {
    selectedIndex = filteredItems.length - 1;
  } else if (selectedIndex >= filteredItems.length) {
    selectedIndex = 0;
  }
  
  renderItems();
}

function sendToAHK(action, data) {
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage({
      action: action,
      data: data
    });
  }
}

function focusInput() {
  const input = document.getElementById('filter-input');
  if (input) {
    setTimeout(() => {
      input.focus();
      input.select();
    }, 50);
  }
}

// Event listeners
document.getElementById('filter-input').addEventListener('input', (e) => {
  filterItems(e.target.value);
});

document.getElementById('filter-input').addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    moveSelection(1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    moveSelection(-1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    selectItem(selectedIndex);
  } else if (e.key === 'Escape') {
    e.preventDefault();
    if (menuStack.length > 0) {
      goBack();
    } else {
      sendToAHK('cancel', '');
    }
  } else if (e.key === 'Backspace' && e.target.value === '' && menuStack.length > 0) {
    e.preventDefault();
    goBack();
  }
});

// Listen for data from AHK via PostWebMessageAsJson
window.chrome.webview.addEventListener('message', (event) => {
  const menuData = event.data;
  if (menuData && menuData.items) {
    init(menuData);
  }
});

// Initialize with empty data
filterItems('');
</script>
</body>
</html>
