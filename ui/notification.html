<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: #111827; border-color: rgba(248,113,113,.55); }
    .titlebar { background: linear-gradient(90deg, #7f1d1d, #312e81); border-bottom-color: rgba(248,113,113,.35); }
    .titlebar-icon { width: 24px; height: 24px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; background: #f97316; color: #111827; font-weight: 900; }
    .content { flex: 1; display: grid; gap: 16px; padding: 22px; background: radial-gradient(circle at top left, rgba(248,113,113,.24), transparent 42%), #111827; }
    .badge { display: inline-flex; width: fit-content; border: 1px solid rgba(248,113,113,.5); color: #fecaca; padding: 5px 9px; border-radius: 999px; text-transform: uppercase; font-size: 11px; letter-spacing: .1em; }
    h1 { font-size: 26px; line-height: 1.05; letter-spacing: -0.04em; }
    .message { color: #fde68a; font-size: 15px; }
    .detail { color: var(--text-secondary); font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-self: end; }
    .btn { border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color: var(--text-primary); padding: 10px 13px; border-radius: 9px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: rgba(255,255,255,.14); }
    .btn.primary { background: #f97316; border-color: #fb923c; color: #111827; font-weight: 800; }
    .btn.good { border-color: rgba(78,201,176,.55); color: #a8fff0; }
    .btn.warn { border-color: rgba(206,145,120,.55); color: #ffd0be; }
  </style>
</head>
<body>
  <div class="titlebar">
    <div class="grip"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="titlebar-title"><span class="titlebar-icon" id="icon">!</span> <span id="window-title">Notification</span></div>
    <div class="window-controls">
      <button class="win-btn win-minimize" onclick="minimizeWindow()" title="Minimize">&#x2212;</button>
      <button class="win-btn win-close" onclick="closeWindow()" title="Close">&#x2715;</button>
    </div>
  </div>

  <main class="content">
    <div class="badge" id="badge">Aviso</div>
    <h1 id="title">Notification</h1>
    <div class="message" id="message"></div>
    <div class="detail" id="detail"></div>
    <div class="actions" id="actions"></div>
  </main>

  <script src="ahk-bridge.js"></script>
  <script>
    function sendToAHK(action, data = {}) { postToAHK({ action, ...data }); }
    function setText(id, value) { document.getElementById(id).textContent = value ?? ''; }
    function escapeHtml(value) { return String(value ?? '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch])); }
    function jsString(value) { return String(value ?? '').replace(/[\\']/g, ch => ({ '\\': '\\\\', "'": "\\'" }[ch])); }
    function render(payload) {
      if (!payload || payload.action !== 'notification') return;
      const notification = payload.notification || {};
      setText('window-title', notification.windowTitle || 'Notification');
      setText('icon', notification.icon || '!');
      setText('badge', notification.badge || 'Aviso');
      setText('title', notification.title || 'Notification');
      setText('message', notification.message || '');
      setText('detail', notification.detail || '');
      const buttons = Array.isArray(notification.buttons) && notification.buttons.length
        ? notification.buttons
        : [{ action: 'dismiss', label: 'Cerrar', variant: 'primary', close: true }];
      document.getElementById('actions').innerHTML = buttons.map(button => {
        const action = jsString(button.action || 'dismiss');
        const close = button.close === false ? 'false' : 'true';
        const variant = escapeHtml(button.variant || '');
        const label = escapeHtml(button.label || 'Cerrar');
        return `<button class="btn ${variant}" onclick="sendToAHK('button', { buttonAction: '${action}', close: ${close} })">${label}</button>`;
      }).join('');
    }
    if (window.chrome?.webview) window.chrome.webview.addEventListener('message', event => render(event.data));
    window.addEventListener('DOMContentLoaded', () => sendToAHK('ready'));
  </script>
</body>
</html>
